name: Actualizar Tasas Automaticamente

on:
  schedule:
    - cron: '*/15 * * * *' # Se ejecuta al minuto 0 de cada hora
  workflow_dispatch: # Te permite ejecutarlo manualmente desde GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        # Asegúrate de que este archivo exista en tu carpeta dolar_backend
        run: pip install -r dolar_backend/requirements.txt

      - name: Ejecutar Extractor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python dolar_backend/extractor.py

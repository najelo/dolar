name: Actualizar Tasas Automaticamente

on:
  schedule:
    - cron: '*/15 * * * *' # Se ejecuta cada 15 min
  workflow_dispatch: # Te permite darle al botón "Run workflow" manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          pip install supabase python-dotenv
          
      - name: Ejecutar Extractor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          # Asegúrate de que la ruta sea exactamente la carpeta donde está tu archivo .py
          python dolar_backend/tu_archivo_extractor.py

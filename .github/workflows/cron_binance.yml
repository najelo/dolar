name: Actualizar Binance P2P

on:
  schedule:
    # Ejecuta cada 60 minutos en un minuto aleatorio (ej. cada hora, min 12)
    # Esto es mucho más seguro que cada 15 minutos.
    - cron: '12 * * * *'
  workflow_dispatch: 

jobs:
  update-binance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests supabase
          
      - name: Ejecutar script Binance
        run: python dolar_backend/binance_service.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
